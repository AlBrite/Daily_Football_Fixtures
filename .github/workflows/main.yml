name: Post Match Result

on:
  workflow_dispatch:
    inputs:
      home:
        description: "Home team name (must match registry exactly)"
        required: true
        type: string
      away:
        description: "Away team name (must match registry exactly)"
        required: true
        type: string

jobs:
  post-result:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post match result to Facebook
        env:
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          HOME_TEAM:            ${{ github.event.inputs.home }}
          AWAY_TEAM:            ${{ github.event.inputs.away }}
        run: python match_result.py

      # Commit the updated registry.json (entry removed after posting)
      - name: Commit updated registry
        run: |
          git config user.name  "AlBrite"
          git config user.email "bce.algorithm@gmail.com"
          git add registry.json
          git diff --cached --quiet || git commit -m "chore: remove posted match from registry [${{ github.event.inputs.home }} vs ${{ github.event.inputs.away }}]"
          git push

