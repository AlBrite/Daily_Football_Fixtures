name: Daily Football Fixtures Post

on:
  schedule:
    # Runs at 07:00 UTC every day. GitHub Actions cron is always UTC —
    # see README.md for how to adjust this for your local 7 AM.
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  post-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fixture poster
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python fixture.py
        
